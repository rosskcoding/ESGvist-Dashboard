{# Quote block template #}
{% set style = data.get('style', 'blockquote') %}
{% set quote_text = fields.get('quote_text', '') %}
{% set author_name = fields.get('author_name', '') %}
{% set author_title = fields.get('author_title', '') %}

<figure 
  class="rpt-block rpt-block--quote rpt-quote--{{ style }} rpt-variant--{{ variant }} rpt-preset--{{ preset | css_class }}"
  id="block-{{ block.block_id }}"
  data-block-id="{{ block.block_id }}"
  data-block-type="quote"
>
  {% if quote_text %}
  <blockquote class="rpt-quote__text">
    <span class="rpt-quote__mark">"</span>
    <p>«{{ quote_text }}»</p>
  </blockquote>
  {% endif %}
  
  {% if author_name %}
  <figcaption class="rpt-quote__attribution">
    <cite class="rpt-quote__author">— {{ author_name }}</cite>
    {% if author_title %}
    <span class="rpt-quote__title">, {{ author_title }}</span>
    {% endif %}
  </figcaption>
  {% endif %}
</figure>
