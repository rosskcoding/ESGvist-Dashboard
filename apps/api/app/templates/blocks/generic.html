{# Generic/fallback block template #}
<div 
  class="rpt-block rpt-block--generic rpt-variant--{{ variant }} rpt-preset--{{ preset | css_class }}"
  id="block-{{ block.block_id }}"
  data-block-id="{{ block.block_id }}"
  data-block-type="{{ block.type.value }}"
>
  <div class="rpt-block__placeholder">
    <span class="rpt-block__placeholder-label">Block: {{ block.type.value }}</span>
    <pre class="rpt-block__placeholder-data">{{ fields | tojson(indent=2) }}</pre>
  </div>
</div>
