{# Text block template #}
<div 
  class="rpt-block rpt-block--text rpt-variant--{{ variant }} rpt-preset--{{ preset | css_class }}"
  id="block-{{ block.block_id }}"
  data-block-id="{{ block.block_id }}"
  data-block-type="text"
>
  <div class="rpt-block__content rpt-prose">
    {{ fields.get('body_html', '') | safe }}
  </div>
</div>
