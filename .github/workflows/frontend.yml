name: Frontend Smoke

on:
  push:
    paths:
      - "frontend/**"
      - "backend/**"
      - "artifacts/demo/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "artifacts/demo/**"
      - ".github/workflows/frontend.yml"

jobs:
  guided-collection-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/esgvist_playwright
      PLAYWRIGHT_FRONTEND_PORT: "3003"
      PLAYWRIGHT_API_PORT: "8003"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: esgvist_playwright
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: backend
        run: uv pip install --system -e ".[dev]"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Type check frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Guided collection smoke
        working-directory: frontend
        run: pnpm test:e2e:guided-collection
