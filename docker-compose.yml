services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: esgvist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/esgvist
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: esg-evidence
      MINIO_SECURE: "false"
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      DEBUG: "true"
      DB_AUTO_UPGRADE: ${DB_AUTO_UPGRADE:-false}
      DB_REQUIRE_CURRENT_REVISION: ${DB_REQUIRE_CURRENT_REVISION:-false}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_HOST: api
      API_PORT: "8000"

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
