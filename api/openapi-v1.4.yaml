      responses:
        '200':
          description: Requirement items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItemListResponse'
      security:
      - bearerAuth: []
      - oauth2: &id019
        - standards:read
      x-scopes: *id019
      description: Supports page/pageSize and cursor-based pagination via nextCursor.
    post:
      tags:
