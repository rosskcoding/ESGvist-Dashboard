        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        - reviewer
        - auditor
        objectRules:
        - user.organizationId == project.organizationId
