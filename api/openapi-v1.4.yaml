      summary: Create requirement item
      operationId: createRequirementItem
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
