      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        - esg_manager
        objectRules:
        - user.organizationId == project.organizationId
      security:
      - bearerAuth: []
      - oauth2: &id034
