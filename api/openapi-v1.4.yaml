      x-scopes: *id020
  /requirement-items/{requirementItemId}:
    get:
      tags:
      - Standards
      summary: Get requirement item
      operationId: getRequirementItem
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          description: Requirement item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItem'
      security:
      - bearerAuth: []
      - oauth2: &id021
        - standards:read
      x-scopes: *id021
    patch:
      tags:
      - Standards
      summary: Update requirement item
      operationId: updateRequirementItem
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRequirementItemRequest'
      responses:
        '200':
          description: Updated requirement item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItem'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
      security:
      - bearerAuth: []
      - oauth2: &id022
        - standards:write
      x-scopes: *id022
  /requirement-items/{requirementItemId}/dependencies:
