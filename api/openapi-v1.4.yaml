      summary: Get shared element
      operationId: getSharedElement
      parameters:
      - $ref: '#/components/parameters/SharedElementId'
      - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          description: Shared element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElement'
      security:
      - bearerAuth: []
      - oauth2: &id026
        - shared:read
      x-scopes: *id026
    patch:
      tags:
      - Shared Elements
      summary: Update shared element
      operationId: updateSharedElement
      parameters:
      - $ref: '#/components/parameters/SharedElementId'
      - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSharedElementRequest'
      responses:
        '200':
          description: Updated shared element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElement'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
