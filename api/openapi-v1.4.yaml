components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    oauth2:
      type: oauth2
      description: OAuth2 bearer access with role-aligned scopes.
      flows:
        authorizationCode:
          authorizationUrl: https://auth.esgvist.example.com/oauth/authorize
          tokenUrl: https://auth.esgvist.example.com/oauth/token
          scopes:
            standards:read: Read standards and catalog structures
            standards:write: Create and modify standards and catalog structures
            shared:read: Read shared elements and mappings
            shared:write: Create and modify shared elements and mappings
            projects:read: Read reporting projects
            projects:write: Create and modify reporting projects
            assignments:read: Read metric assignments
            assignments:write: Create and modify metric assignments
            datapoints:read: Read data points
            datapoints:write: Create and update data points
            review:read: Read review queue and comments
            review:write: Approve, reject, and request revision
            merge:read: Read merge view and impact preview
            completeness:read: Read completeness and readiness data
            completeness:write: Trigger completeness recalculation
            exports:write: Generate exports
            users:read: Read users
            users:write: Create and modify users
            audit:read: Read audit log
            notifications:read: Read notifications
            notifications:write: Mark notifications as read
    webhookSignature:
      type: apiKey
      in: header
      name: X-Webhook-Signature
      description: HMAC SHA-256 signature of the raw request body, signed with the
        webhook secret.
  parameters:
    StandardId:
      name: standardId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    StandardIdQuery:
      name: standardId
      in: query
      schema:
        type: integer
        format: int64
    DisclosureRequirementId:
      name: disclosureRequirementId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequirementItemId:
      name: requirementItemId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SharedElementId:
      name: sharedElementId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    DataPointId:
      name: dataPointId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    IsActive:
      name: isActive
      in: query
      schema:
        type: boolean
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Optional client-provided request ID for traceability. If omitted,
        server generates one.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 1-based page number.
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 25
      description: Number of items per page.
    NextCursor:
      name: nextCursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque cursor for cursor-based pagination. If provided, page/pageSize
        may be ignored.
  schemas:
    Standard:
      type: object
      required:
      - id
      - code
      - name
      - isActive
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        version:
          type: string
        jurisdiction:
          type: string
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
