openapi: 3.1.0
info:
  title: ESGvist API
  version: 1.4.0
  summary: API contracts for ESG data collection, merge, review, reporting, and outbound
    webhooks
  description: 'API for ESGvist — a standard-centric ESG reporting platform with shared
    data reuse,

    delta requirements, workflow, review, and completeness calculation.

    '
servers:
- url: https://api.esgvist.example.com/v1
  description: Production
- url: https://sandbox.esgvist.example.com/v1
  description: Sandbox
tags:
- name: Auth
- name: Standards
- name: Shared Elements
- name: Projects
- name: Assignments
- name: Data Points
- name: Review
- name: Merge
- name: Completeness
- name: Reports
- name: Admin
security:
- bearerAuth: []
paths:
  /auth/me:
    get:
      tags:
      - Auth
      summary: Get current user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      security:
      - bearerAuth: []
      - oauth2: &id001
        - projects:read
      x-scopes: *id001
  /standards:
    get:
      tags:
      - Standards
      summary: List standards
      operationId: listStandards
      parameters:
      - $ref: '#/components/parameters/IsActive'
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/NextCursor'
      responses:
        '200':
          description: Standards list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardListResponse'
      security:
      - bearerAuth: []
      - oauth2: &id002
        - standards:read
      x-scopes: *id002
      description: Supports page/pageSize and cursor-based pagination via nextCursor.
    post:
      tags:
      - Standards
      summary: Create standard
      operationId: createStandard
      security:
      - bearerAuth: []
      - oauth2: &id003
        - standards:write
      responses:
        '201':
          description: Standard created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
        '400': &id005
          $ref: '#/components/responses/BadRequest'
        '401': &id006
          $ref: '#/components/responses/Unauthorized'
        '403': &id007
          $ref: '#/components/responses/Forbidden'
        '404': &id008
          $ref: '#/components/responses/NotFound'
        '409': &id009
          $ref: '#/components/responses/Conflict'
        '422': &id010
          $ref: '#/components/responses/UnprocessableEntity'
        '500': &id011
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStandardRequest'
      x-permissions:
        roles:
        - admin
        objectRules:
        - user.organizationId == request.organizationId || same-tenant-admin
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      x-scopes: *id003
  /standards/{standardId}:
    get:
      tags:
      - Standards
      summary: Get standard
      operationId: getStandard
      parameters:
      - $ref: '#/components/parameters/StandardId'
      - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          description: Standard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
      security:
      - bearerAuth: []
      - oauth2: &id004
        - standards:read
      x-scopes: *id004
    patch:
      tags:
      - Standards
      summary: Update standard
      operationId: updateStandard
      parameters:
      - $ref: '#/components/parameters/StandardId'
      - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStandardRequest'
      responses:
        '200':
          description: Updated standard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
      security:
      - bearerAuth: []
      - oauth2: &id012
        - standards:write
      x-scopes: *id012
  /standards/{standardId}/sections:
    get:
      tags:
      - Standards
      summary: List sections of a standard
      operationId: listStandardSections
      parameters:
      - $ref: '#/components/parameters/StandardId'
      - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          description: Sections tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSectionTreeResponse'
      security:
      - bearerAuth: []
      - oauth2: &id013
        - standards:read
      x-scopes: *id013
    post:
      tags:
      - Standards
      summary: Create section
      operationId: createStandardSection
      parameters:
      - $ref: '#/components/parameters/StandardId'
      - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStandardSectionRequest'
      responses:
        '201':
          description: Section created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSection'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
      security:
      - bearerAuth: []
      - oauth2: &id014
        - standards:write
      x-scopes: *id014
  /disclosure-requirements:
    get:
      tags:
      - Standards
      summary: List disclosure requirements
      operationId: listDisclosureRequirements
      parameters:
      - $ref: '#/components/parameters/StandardIdQuery'
      - name: sectionId
        in: query
        schema:
          type: integer
          format: int64
      - name: mandatoryLevel
        in: query
        schema:
          $ref: '#/components/schemas/MandatoryLevel'
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/NextCursor'
      responses:
        '200':
          description: Disclosure requirements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirementListResponse'
      security:
      - bearerAuth: []
      - oauth2: &id015
        - standards:read
      x-scopes: *id015
      description: Supports page/pageSize and cursor-based pagination via nextCursor.
    post:
      tags:
      - Standards
      summary: Create disclosure requirement
      operationId: createDisclosureRequirement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDisclosureRequirementRequest'
      responses:
        '201':
          description: Disclosure requirement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirement'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
      parameters:
      - $ref: '#/components/parameters/RequestIdHeader'
      security:
      - bearerAuth: []
      - oauth2: &id016
        - standards:write
      x-scopes: *id016
  /disclosure-requirements/{disclosureRequirementId}:
    get:
      tags:
      - Standards
      summary: Get disclosure requirement
      operationId: getDisclosureRequirement
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      - $ref: '#/components/parameters/RequestIdHeader'
      responses:
        '200':
          description: Disclosure requirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirement'
      security:
      - bearerAuth: []
      - oauth2: &id017
        - standards:read
      x-scopes: *id017
    patch:
      tags:
      - Standards
      summary: Update disclosure requirement
      operationId: updateDisclosureRequirement
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      - $ref: '#/components/parameters/RequestIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDisclosureRequirementRequest'
      responses:
        '200':
          description: Updated disclosure requirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirement'
        '400': *id005
        '401': *id006
        '403': *id007
        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
      security:
      - bearerAuth: []
      - oauth2: &id018
        - standards:write
      x-scopes: *id018
  /disclosure-requirements/{disclosureRequirementId}/items:
    get:
      tags:
      - Standards
      summary: List requirement items for a disclosure requirement
      operationId: listRequirementItems
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
