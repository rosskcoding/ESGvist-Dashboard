        '404': *id008
        '409': *id009
        '422': *id010
        '500': *id011
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
      security:
      - bearerAuth: []
      - oauth2: &id023
        - standards:write
      x-scopes: *id023
  /shared-elements:
    get:
      tags:
      - Shared Elements
      summary: List shared elements
      operationId: listSharedElements
      parameters:
      - name: conceptDomain
        in: query
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/RequestIdHeader'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - $ref: '#/components/parameters/NextCursor'
