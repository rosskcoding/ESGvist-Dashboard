          schema:
            type: string
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      headers:
        X-Request-Id:
          description: Request ID for tracing logs and support cases.
          schema:
            type: string
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
