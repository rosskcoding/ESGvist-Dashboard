        reviewComment:
          type: string
          nullable: true
        dataPoint:
          $ref: '#/components/schemas/DataPoint'
    CommentCreatedPayload:
      type: object
      required:
      - comment
      properties:
        comment:
          $ref: '#/components/schemas/Comment'
    CompletenessRecalculatedPayload:
      type: object
      required:
      - projectId
      - summary
      properties:
        projectId:
          type: integer
          format: int64
        summary:
          $ref: '#/components/schemas/CompletenessSummaryResponse'
    ExportCompletedPayload:
      type: object
      required:
      - projectId
      - format
      - jobId
      - downloadUrl
      properties:
        projectId:
          type: integer
          format: int64
        format:
          type: string
          enum:
          - gri_index
          - pdf
          - excel
          - xbrl
        jobId:
          type: string
        downloadUrl:
          type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
    NotificationCreatedPayload:
      type: object
      required:
      - notification
      properties:
        notification:
          $ref: '#/components/schemas/Notification'
    WebhookEventSubscription:
      type: string
      enum: *id062
    WebhookEndpoint:
      type: object
      required:
      - id
      - url
      - eventTypes
      - isActive
      - createdAt
      properties:
        id:
          type: integer
          format: int64
        organizationId:
          type: integer
          format: int64
        url:
          type: string
        description:
          type: string
          nullable: true
        eventTypes:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventSubscription'
        isActive:
          type: boolean
        secretLastFour:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    CreateWebhookEndpointRequest:
      type: object
      required:
      - url
      - eventTypes
      properties:
        url:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WebhookEventSubscription'
        secret:
          type: string
          minLength: 16
          description: Shared secret used to sign webhook payloads.
        isActive:
          type: boolean
          default: true
    UpdateWebhookEndpointRequest:
      type: object
      properties:
        url:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventSubscription'
        rotateSecret:
          type: boolean
          default: false
        newSecret:
          type: string
          minLength: 16
        isActive:
          type: boolean
    TestWebhookRequest:
      type: object
      properties:
        eventType:
          $ref: '#/components/schemas/EventType'
        sampleEntityId:
          type: string
          nullable: true
    WebhookEndpointListResponse:
      type: object
      required:
      - items
      - meta
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEndpoint'
        meta:
          $ref: '#/components/schemas/ListMeta'
  responses:
