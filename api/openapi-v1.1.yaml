openapi: 3.1.0
info:
  title: ESGvist API
  version: 1.1.0
  summary: API contracts for ESG data collection, merge, review, and reporting
  description: 'API for ESGvist — a standard-centric ESG reporting platform with shared
    data reuse,

    delta requirements, workflow, review, and completeness calculation.

    '
servers:
- url: https://api.esgvist.example.com/v1
  description: Production
- url: https://sandbox.esgvist.example.com/v1
  description: Sandbox
tags:
- name: Auth
- name: Standards
- name: Shared Elements
- name: Projects
- name: Assignments
- name: Data Points
- name: Review
- name: Merge
- name: Completeness
- name: Reports
- name: Admin
security:
- bearerAuth: []
paths:
  /auth/me:
    get:
      tags:
      - Auth
      summary: Get current user
      operationId: getCurrentUser
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /standards:
    get:
      tags:
      - Standards
      summary: List standards
      operationId: listStandards
      parameters:
      - $ref: '#/components/parameters/IsActive'
      responses:
        '200':
          description: Standards list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardListResponse'
    post:
      tags:
      - Standards
      summary: Create standard
      operationId: createStandard
      security:
      - bearerAuth: []
      responses:
        '201':
          description: Standard created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
        '400': &id001
          $ref: '#/components/responses/BadRequest'
        '401': &id002
          $ref: '#/components/responses/Unauthorized'
        '403': &id003
          $ref: '#/components/responses/Forbidden'
        '404': &id004
          $ref: '#/components/responses/NotFound'
        '409': &id005
          $ref: '#/components/responses/Conflict'
        '422': &id006
          $ref: '#/components/responses/UnprocessableEntity'
        '500': &id007
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStandardRequest'
      x-permissions:
        roles:
        - admin
        objectRules:
        - user.organizationId == request.organizationId || same-tenant-admin
  /standards/{standardId}:
    get:
      tags:
      - Standards
      summary: Get standard
      operationId: getStandard
      parameters:
      - $ref: '#/components/parameters/StandardId'
      responses:
        '200':
          description: Standard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
    patch:
      tags:
      - Standards
      summary: Update standard
      operationId: updateStandard
      parameters:
      - $ref: '#/components/parameters/StandardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStandardRequest'
      responses:
        '200':
          description: Updated standard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /standards/{standardId}/sections:
    get:
      tags:
      - Standards
      summary: List sections of a standard
      operationId: listStandardSections
      parameters:
      - $ref: '#/components/parameters/StandardId'
      responses:
        '200':
          description: Sections tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSectionTreeResponse'
    post:
      tags:
      - Standards
      summary: Create section
      operationId: createStandardSection
      parameters:
      - $ref: '#/components/parameters/StandardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStandardSectionRequest'
      responses:
        '201':
          description: Section created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardSection'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /disclosure-requirements:
    get:
      tags:
      - Standards
      summary: List disclosure requirements
      operationId: listDisclosureRequirements
      parameters:
      - $ref: '#/components/parameters/StandardIdQuery'
      - name: sectionId
        in: query
        schema:
          type: integer
          format: int64
      - name: mandatoryLevel
        in: query
        schema:
          $ref: '#/components/schemas/MandatoryLevel'
      responses:
        '200':
          description: Disclosure requirements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirementListResponse'
    post:
      tags:
      - Standards
      summary: Create disclosure requirement
      operationId: createDisclosureRequirement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDisclosureRequirementRequest'
      responses:
        '201':
          description: Disclosure requirement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirement'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /disclosure-requirements/{disclosureRequirementId}:
    get:
      tags:
      - Standards
      summary: Get disclosure requirement
      operationId: getDisclosureRequirement
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      responses:
        '200':
          description: Disclosure requirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirement'
    patch:
      tags:
      - Standards
      summary: Update disclosure requirement
      operationId: updateDisclosureRequirement
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDisclosureRequirementRequest'
      responses:
        '200':
          description: Updated disclosure requirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisclosureRequirement'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /disclosure-requirements/{disclosureRequirementId}/items:
    get:
      tags:
      - Standards
      summary: List requirement items for a disclosure requirement
      operationId: listRequirementItems
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      responses:
        '200':
          description: Requirement items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItemListResponse'
    post:
      tags:
      - Standards
      summary: Create requirement item
      operationId: createRequirementItem
      parameters:
      - $ref: '#/components/parameters/DisclosureRequirementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequirementItemRequest'
      responses:
        '201':
          description: Requirement item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItem'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /requirement-items/{requirementItemId}:
    get:
      tags:
      - Standards
      summary: Get requirement item
      operationId: getRequirementItem
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      responses:
        '200':
          description: Requirement item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItem'
    patch:
      tags:
      - Standards
      summary: Update requirement item
      operationId: updateRequirementItem
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRequirementItemRequest'
      responses:
        '200':
          description: Updated requirement item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItem'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /requirement-items/{requirementItemId}/dependencies:
    post:
      tags:
      - Standards
      summary: Create dependency for requirement item
      operationId: createRequirementItemDependency
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequirementItemDependencyRequest'
      responses:
        '201':
          description: Dependency created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItemDependency'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /shared-elements:
    get:
      tags:
      - Shared Elements
      summary: List shared elements
      operationId: listSharedElements
      parameters:
      - name: conceptDomain
        in: query
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Shared elements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElementListResponse'
    post:
      tags:
      - Shared Elements
      summary: Create shared element
      operationId: createSharedElement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSharedElementRequest'
      responses:
        '201':
          description: Shared element created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElement'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /shared-elements/{sharedElementId}:
    get:
      tags:
      - Shared Elements
      summary: Get shared element
      operationId: getSharedElement
      parameters:
      - $ref: '#/components/parameters/SharedElementId'
      responses:
        '200':
          description: Shared element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElement'
    patch:
      tags:
      - Shared Elements
      summary: Update shared element
      operationId: updateSharedElement
      parameters:
      - $ref: '#/components/parameters/SharedElementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSharedElementRequest'
      responses:
        '200':
          description: Updated shared element
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElement'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /shared-elements/{sharedElementId}/dimensions:
    put:
      tags:
      - Shared Elements
      summary: Replace dimension configuration for shared element
      operationId: replaceSharedElementDimensions
      parameters:
      - $ref: '#/components/parameters/SharedElementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceSharedElementDimensionsRequest'
      responses:
        '200':
          description: Updated dimensions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedElementDimensionsResponse'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /requirement-items/{requirementItemId}/mappings:
    get:
      tags:
      - Shared Elements
      summary: List mappings for requirement item
      operationId: listRequirementItemMappings
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      responses:
        '200':
          description: Mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItemMappingListResponse'
    post:
      tags:
      - Shared Elements
      summary: Create mapping from requirement item to shared element
      operationId: createRequirementItemMapping
      parameters:
      - $ref: '#/components/parameters/RequirementItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequirementItemMappingRequest'
      responses:
        '201':
          description: Mapping created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementItemMapping'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        objectRules:
        - same-tenant-admin
  /projects:
    get:
      tags:
      - Projects
      summary: List reporting projects
      operationId: listProjects
      parameters:
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/ProjectStatus'
      responses:
        '200':
          description: Reporting projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        - reviewer
        - auditor
        objectRules:
        - tenant isolation applies
        - collector/reviewer limited to assigned projects
    post:
      tags:
      - Projects
      summary: Create reporting project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        objectRules:
        - user.organizationId == request.organizationId || same-tenant
  /projects/{projectId}:
    get:
      tags:
      - Projects
      summary: Get reporting project
      operationId: getProject
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        - reviewer
        - auditor
        objectRules:
        - user.organizationId == project.organizationId
        - collector/reviewer limited by assignment visibility
    patch:
      tags:
      - Projects
      summary: Update reporting project
      operationId: updateProject
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        objectRules:
        - user.organizationId == project.organizationId
  /projects/{projectId}/standards:
    put:
      tags:
      - Projects
      summary: Replace project standards
      operationId: replaceProjectStandards
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceProjectStandardsRequest'
      responses:
        '200':
          description: Updated project standards
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStandardListResponse'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        objectRules:
        - user.organizationId == project.organizationId
  /projects/{projectId}/assignments:
    get:
      tags:
      - Assignments
      summary: List metric assignments
      operationId: listAssignments
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - name: collectorId
        in: query
        schema:
          type: integer
          format: int64
      - name: reviewerId
        in: query
        schema:
          type: integer
          format: int64
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/AssignmentStatus'
      responses:
        '200':
          description: Assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentListResponse'
    post:
      tags:
      - Assignments
      summary: Create metric assignment
      operationId: createAssignment
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        objectRules:
        - user.organizationId == project.organizationId
  /assignments/{assignmentId}:
    patch:
      tags:
      - Assignments
      summary: Update metric assignment
      operationId: updateAssignment
      parameters:
      - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssignmentRequest'
      responses:
        '200':
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        objectRules:
        - user.organizationId == assignment.organizationId
  /projects/{projectId}/data-points:
    get:
      tags:
      - Data Points
      summary: List data points for project
      operationId: listProjectDataPoints
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/DataPointStatus'
      - name: collectorView
        in: query
        schema:
          type: boolean
      - name: sharedElementId
        in: query
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Data points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPointListResponse'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        - reviewer
        - auditor
        objectRules:
        - user.organizationId == project.organizationId
        - collector -> own/assigned only
        - reviewer -> assigned review scope only
    post:
      tags:
      - Data Points
      summary: Create data point
      operationId: createDataPoint
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataPointRequest'
      responses:
        '201':
          description: Data point created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPoint'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        objectRules:
        - user.organizationId == project.organizationId
        - collector must own assignment for sharedElementId when role=collector
        - project.status in ['draft','in_progress']
  /data-points/{dataPointId}:
    get:
      tags:
      - Data Points
      summary: Get data point
      operationId: getDataPoint
      parameters:
      - $ref: '#/components/parameters/DataPointId'
      responses:
        '200':
          description: Data point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPoint'
    patch:
      tags:
      - Data Points
      summary: Update data point
      operationId: updateDataPoint
      parameters:
      - $ref: '#/components/parameters/DataPointId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDataPointRequest'
      responses:
        '200':
          description: Updated data point
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPoint'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        objectRules:
        - user.organizationId == dataPoint.organizationId
        - role=collector -> owns assignment and dataPoint.status in ['draft','rejected','needs_revision']
        - role=esg_manager -> override allowed with audit log
        - project.status != 'published'
  /data-points/{dataPointId}/reuse-candidates:
    get:
      tags:
      - Data Points
      summary: Find reuse candidates for a data point draft
      operationId: findReuseCandidates
      parameters:
      - $ref: '#/components/parameters/DataPointId'
      responses:
        '200':
          description: Reuse candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReuseCandidateListResponse'
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '409': *id005
        '422': *id006
        '500': *id007
      x-permissions:
        roles:
        - admin
        - esg_manager
        - collector
        objectRules:
        - user.organizationId == dataPoint.organizationId
